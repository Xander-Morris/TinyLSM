# Headless service — gives each pod a stable DNS name:
# tinylsm-0.tinylsm, tinylsm-1.tinylsm, tinylsm-2.tinylsm
apiVersion: v1
kind: Service
metadata:
  name: tinylsm
spec:
  clusterIP: None
  selector:
    app: tinylsm
  ports:
    - name: http
      port: 8000

---

# NodePort service — exposes any node externally for testing
apiVersion: v1
kind: Service
metadata:
  name: tinylsm-external
spec:
  type: NodePort
  selector:
    app: tinylsm
  ports:
    - name: http
      port: 8000
      nodePort: 30000
